gitea:
  url: http://127.0.0.1:3000
  token: ${GITEA_TOKEN}

logs:
  max-log-history: 10
  level: deploy

hooks:
  on-agent-start: "echo agent-start：${hook_current_time}"

scripts:
  reload-nginx-cmd: "nginx -s reload"
  # package 流程总超时（秒）；generic 与 docker-container 均适用
  package-timeout-seconds: 60

services:

  - name: frontend
    package:
      type: generic
      owner: OwnerName
      name: PackageName
      file: dist.zip
    deploy:
      strategy: frontend-dist
      target: /data/nginx/web/my-website

  - name: docker-compose-backend
    package:
      type: docker-container
      owner: OwnerName
      name: PackageName
    deploy:
      strategy: docker-compose
      compose: /data/docker/compose/my-backend-1/docker-compose.yml
      service: backend
      started-check-seconds: 3

  # 可与上一 service 共享同一 compose 文件，但 compose+service 组合须全局唯一
  - name: docker-compose-backend-2
    package:
      type: docker-container
      owner: OwnerName
      name: AnotherPackageName
    deploy:
      strategy: docker-compose
      compose: /data/docker/compose/my-backend-1/docker-compose.yml
      service: backend-2
      started-check-seconds: 5

  - name: docker-run-backend
    package:
      type: docker-container
      owner: OwnerName
      name: DockerRunPackageName
    deploy:
      strategy: docker-run
      started-check-seconds: 5
      containers:
        - options: >-
            --name my-api
            -p 8080:8080
            --restart unless-stopped
            --network my-host
